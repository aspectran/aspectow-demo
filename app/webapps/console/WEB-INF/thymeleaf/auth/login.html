<!DOCTYPE html>
<html lang="en"
      xmlns:th="https://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{templates/__${page.layout}__}">
<head>
    <style>
        .login-card {
            max-width: 400px;
            margin: 100px auto;
        }
    </style>
</head>
<body>
    <div layout:fragment="content">
        <div class="card login-card shadow">
            <div class="card-body p-5 text-center">
                <img src="https://assets.aspectran.com/img/aspectran-logo.svg" class="mb-4" style="height: 48px;" alt="Aspectran"/>
                <h2 class="fw-bold mb-2">Login</h2>
                <p class="text-muted mb-5">Please enter your username and password!</p>

                <form id="login-form">
                    <div class="form-floating mb-3 text-start">
                        <input type="text" class="form-control" id="username" name="username" placeholder="Username" required>
                        <label for="username">Username</label>
                    </div>
                    <div class="form-floating mb-4 text-start">
                        <input type="password" class="form-control" id="password" name="password" placeholder="Password" required>
                        <label for="password">Password</label>
                    </div>

                    <div id="error-message" class="alert alert-danger d-none" role="alert"></div>

                    <div class="d-grid">
                        <button class="btn btn-primary btn-lg" type="submit">Login</button>
                    </div>
                </form>
            </div>
        </div>

        <!-- Password Setup Modal -->
        <div class="modal fade" id="setup-password-modal" data-bs-backdrop="static" data-bs-keyboard="false" tabindex="-1" aria-labelledby="setupPasswordModalLabel" aria-hidden="true">
            <div class="modal-dialog modal-dialog-centered">
                <div class="modal-content">
                    <div class="modal-header">
                        <h5 class="modal-title fw-bold" id="setupPasswordModalLabel">Setup Administrator Password</h5>
                    </div>
                    <form id="setup-password-form">
                        <div class="modal-body text-start p-4">
                            <p class="text-muted mb-4">For security, you must set a new password for the administrator account within 1 hour of installation.</p>
                            <input type="hidden" id="setup-username" name="username">
                            <input type="hidden" id="setup-current-password" name="currentPassword">
                            
                            <div class="form-floating mb-3">
                                <input type="password" class="form-control" id="new-password" name="newPassword" placeholder="New Password" required minlength="4">
                                <label for="new-password">New Password</label>
                            </div>
                            <div class="form-floating mb-3">
                                <input type="password" class="form-control" id="confirm-password" placeholder="Confirm Password" required minlength="4">
                                <label for="confirm-password">Confirm Password</label>
                            </div>
                            <div id="setup-error-message" class="alert alert-danger d-none" role="alert"></div>
                        </div>
                        <div class="modal-footer p-3">
                            <button type="submit" class="btn btn-primary w-100 btn-lg">Save Password & Login</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <th:block layout:fragment="script">
        <script th:inline="javascript">
            $(function() {
                $('#login-form').on('submit', function(e) {
                    e.preventDefault();
                    const $error = $('#error-message');
                    $error.addClass('d-none');

                    $.ajax({
                        url: [[@{/auth/login}]],
                        type: 'POST',
                        data: $(this).serialize(),
                        dataType: 'json',
                        success: function(response) {
                            console.log('Login Response:', response);
                            if (response.success) {
                                location.href = [[@{/}]];
                            } else {
                                if (response.error && response.error.code === 'setup_required') {
                                    $('#setup-username').val($('#username').val());
                                    $('#setup-current-password').val($('#password').val());
                                    const modal = new bootstrap.Modal(document.getElementById('setup-password-modal'));
                                    modal.show();
                                } else {
                                    let message = (response.error ? response.error.message : 'Login failed');
                                    $error.text(message).removeClass('d-none');
                                }
                            }
                        },
                        error: function() {
                            $error.text('An error occurred. Please try again.').removeClass('d-none');
                        }
                    });
                });

                $('#setup-password-form').on('submit', function(e) {
                    e.preventDefault();
                    const $setupError = $('#setup-error-message');
                    $setupError.addClass('d-none');

                    const newPassword = $('#new-password').val();
                    const confirmPassword = $('#confirm-password').val();

                    if (newPassword !== confirmPassword) {
                        $setupError.text('Passwords do not match.').removeClass('d-none');
                        return;
                    }

                    $.ajax({
                        url: [[@{/auth/setup-password}]],
                        type: 'POST',
                        data: $(this).serialize(),
                        dataType: 'json',
                        success: function(response) {
                            if (response.success) {
                                $('#password').val(newPassword);
                                $('#login-form').submit();
                            } else {
                                let message = (response.error ? response.error.message : 'Failed to update password');
                                $setupError.text(message).removeClass('d-none');
                            }
                        },
                        error: function() {
                            $setupError.text('An error occurred. Please try again.').removeClass('d-none');
                        }
                    });
                });
            });
        </script>
    </th:block>
</body>
</html>
