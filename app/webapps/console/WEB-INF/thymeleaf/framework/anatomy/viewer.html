<!DOCTYPE html>
<html lang="en"
      xmlns:th="https://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{templates/default}">
<head>
    <title>Framework Anatomy - Aspectow Console</title>
    <style>
        .anatomy-container {
            height: calc(100vh - 200px);
            min-height: 600px;
        }
        .left-panel, .right-panel {
            height: 100%;
            display: flex;
            flex-direction: column;
        }
        .scrollable-pane {
            flex: 1;
            overflow-y: auto;
        }
        .rule-item {
            cursor: pointer;
            font-size: 0.875rem;
            padding: 8px 16px;
        }
        .rule-item:hover {
            background-color: var(--bs-tertiary-bg);
        }
        .rule-item.active {
            background-color: rgba(62, 207, 142, 0.1);
            color: var(--accent-color);
            border-color: var(--accent-color);
        }

        .component-header {
            font-weight: 700;
            background-color: var(--bs-tertiary-bg);
            padding: 10px 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
            border-bottom: 1px solid var(--bs-border-color);
        }
        .component-header:not(.collapsed) {
            color: var(--accent-color);
        }
    </style>
</head>
<body>
    <div layout:fragment="content">
        <div class="anatomy-tabs mt-2">
            <ul class="nav nav-tabs">
                <li class="nav-item" th:each="name : ${page.allContextNames}">
                    <a class="nav-link"
                       th:href="@{/framework/anatomy/{name}(name=${name})}"
                       th:classappend="${page.contextName == name} ? 'active' : ''">
                        <i class="bi bi-pc-display-horizontal me-1"></i>
                        <span th:text="${name}">Context Name</span>
                    </a>
                </li>
            </ul>
        </div>
        <div class="row anatomy-container g-3 mt-1">
            <div class="col-md-4 left-panel">
                <div class="card h-100 border shadow-sm overflow-hidden">
                    <div class="p-2 border-bottom">
                        <div class="input-group input-group-sm">
                            <span class="input-group-text bg-transparent border-end-0"><i class="bi bi-search"></i></span>
                            <input type="text" id="rule-filter" class="form-control border-start-0" placeholder="Filter rules..."/>
                        </div>
                    </div>
                    <div class="scrollable-pane p-0" id="component-tree">
                        <div class="text-center p-5 text-muted">
                            <div class="spinner-border spinner-border-sm me-2" role="status"></div>
                            Loading anatomy data...
                        </div>
                    </div>
                </div>
            </div>
            <div class="col-md-8 right-panel">
                <div class="card h-100 border shadow-sm overflow-hidden">
                    <div class="card-header bg-body-tertiary py-2 d-flex justify-content-between align-items-center">
                        <span class="fw-bold small">Rule Details (APON)</span>
                        <button class="btn btn-sm btn-outline-secondary border-0" id="copy-btn" title="Copy to clipboard">
                            <i class="bi bi-clipboard"></i>
                        </button>
                    </div>
                    <div class="card-body scrollable-pane text-body">
                        <pre id="details-content">Select a rule from the left panel to see details.</pre>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <th:block layout:fragment="script">
        <script th:src="@{/assets/js/apon-highlighter.js}"></script>
        <script th:inline="javascript">
            $(function() {
                const dataUrl = [[@{/framework/anatomy/{name}/data(name=${page.contextName})}]];
                const $componentTree = $('#component-tree');
                const $detailsContent = $('#details-content');

                $.getJSON(dataUrl, function(data) {
                    const anatomyData = data.anatomyData;
                    if (!anatomyData) {
                        $componentTree.html('<div class="p-3 text-danger">Failed to load data.</div>');
                        return;
                    }

                    $componentTree.empty();

                    $.each(anatomyData, function(componentKey, rules) {
                        const componentId = 'comp-' + componentKey.replace(/\s+/g, '-').toLowerCase();

                        const $header = $('<div/>', {
                            'class': 'component-header collapsed',
                            'data-bs-toggle': 'collapse',
                            'data-bs-target': '#' + componentId,
                            'html': `<span>${componentKey}</span> <span class="badge rounded-pill bg-secondary small">${rules.length}</span>`
                        });

                        const $ruleList = $('<div/>', {
                            'id': componentId,
                            'class': 'collapse list-group list-group-flush border-bottom'
                        });

                        if (rules.length > 0) {
                            $.each(rules, function(index, rule) {
                                const ruleName = rule.name || rule.id || rule.className || 'Unnamed Rule';
                                const $ruleItem = $('<div/>', {
                                    'class': 'list-group-item rule-item',
                                    'text': ruleName,
                                    'data-apon': rule.apon
                                });

                                $ruleItem.on('click', function() {
                                    $('.rule-item').removeClass('active');
                                    $(this).addClass('active');
                                    
                                    // Apply syntax highlighting from imported apon-highlighter.js
                                    $detailsContent.html(highlightApon(rule.apon));
                                });

                                $ruleList.append($ruleItem);
                            });
                        } else {
                            $ruleList.append('<div class="list-group-item text-muted small px-3">No rules defined.</div>');
                        }

                        $componentTree.append($header).append($ruleList);
                    });
                });

                $('#rule-filter').on('keyup', function() {
                    const filterText = $(this).val().toLowerCase();
                    $('.component-header').each(function() {
                        const $header = $(this);
                        const $list = $header.next('.collapse');
                        let hasMatch = false;

                        $list.find('.rule-item').each(function() {
                            const $item = $(this);
                            if ($item.text().toLowerCase().includes(filterText)) {
                                $item.show();
                                hasMatch = true;
                            } else {
                                $item.hide();
                            }
                        });

                        if (hasMatch || filterText === '') {
                            $header.show();
                        } else {
                            $header.hide();
                        }
                    });
                });

                $('#copy-btn').on('click', function() {
                    const activeItem = $('.rule-item.active');
                    if (activeItem.length > 0) {
                        const text = activeItem.data('apon') || '';
                        navigator.clipboard.writeText(text).then(() => {
                            const $icon = $(this).find('i');
                            $icon.removeClass('bi-clipboard').addClass('bi-check-lg text-success');
                            setTimeout(() => $icon.removeClass('bi-check-lg text-success').addClass('bi-clipboard'), 2000);
                        });
                    }
                });
            });
        </script>
    </th:block>
</body>
</html>
