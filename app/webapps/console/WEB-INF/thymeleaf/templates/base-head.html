<!DOCTYPE html>
<html lang="en" xmlns:th="https://www.thymeleaf.org">
<!-- Theme configuration script - should be placed as high as possible in <head> -->
<th:block th:fragment="theme-script">
    <script>
        (() => {
            const getStoredTheme = () => localStorage.getItem('theme');
            const getPreferredTheme = () => {
                const storedTheme = getStoredTheme();
                if (storedTheme) return storedTheme;
                return 'auto';
            };
            const setTheme = theme => {
                const newTheme = theme === 'auto'
                    ? (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light')
                    : theme;
                document.documentElement.setAttribute('data-bs-theme', newTheme);
            };
            setTheme(getPreferredTheme());
        })();
    </script>
</th:block>

<!-- Common external assets -->

    <link rel="icon" type="image/png" sizes="32x32" href="https://assets.aspectran.com/img/favicon-32x32.png"/>
