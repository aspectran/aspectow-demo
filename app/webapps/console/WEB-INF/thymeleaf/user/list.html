<!DOCTYPE html>
<html lang="en"
      xmlns:th="https://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{templates/default}">
<body>
<th:block layout:fragment="content">
    <div class="d-flex flex-column flex-md-row justify-content-between align-items-start align-items-md-center gap-3 mb-3">
        <h4 class="mb-0"><i class="bi bi-people me-2"></i> User Management</h4>
        <div class="d-flex flex-wrap align-items-center gap-2 gap-md-3">
            <select class="form-select form-select-sm" id="pageSizeSelect" style="width: auto;">
                <option value="auto">Auto (Fit Height)</option>
                <option value="10">10 per page</option>
                <option value="20">20 per page</option>
                <option value="30">30 per page</option>
                <option value="50">50 per page</option>
                <option value="100">100 per page</option>
            </select>
            <div class="d-flex flex-wrap gap-2" th:if="${session.USER_INFO.hasPermission('USER_MANAGE')}">
                <button type="button" class="btn btn-sm btn-outline-secondary" onclick="openRoleModal()">
                    <i class="bi bi-shield-lock"></i> Role Permissions
                </button>
                <button type="button" class="btn btn-sm btn-primary" onclick="openUserModal()">
                    <i class="bi bi-person-plus"></i> New User
                </button>
            </div>
        </div>
    </div>

    <div class="card shadow-sm overflow-hidden mb-4">
        <div class="card-body p-0">
            <div class="table-responsive">
                <table class="table table-hover table-striped mb-0 align-middle">
                    <thead>
                    <tr>
                        <th class="ps-3 text-muted small text-uppercase" style="width: 60px;">ID</th>
                        <th class="text-muted small text-uppercase">Username</th>
                        <th class="text-muted small text-uppercase">Nickname</th>
                        <th class="text-muted small text-uppercase">Email</th>
                        <th class="text-muted small text-uppercase">Roles</th>
                        <th class="text-muted small text-uppercase">Status</th>
                        <th class="text-muted small text-uppercase">Last Login</th>
                        <th th:if="${session.USER_INFO.hasPermission('USER_MANAGE')}" class="text-end pe-3 text-muted small text-uppercase">Actions</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="user : ${page.userList}">
                        <td class="ps-3" th:text="${user.userId}">1</td>
                        <td class="fw-bold" th:text="${user.username}">admin</td>
                        <td th:text="${user.nickname}">Admin User</td>
                        <td th:text="${user.email}">admin@example.com</td>
                        <td>
                            <span th:each="role : ${user.roles}"
                                  class="badge bg-secondary me-1"
                                  th:text="${role.roleName}">ADMIN</span>
                        </td>
                        <td>
                            <span th:class="${user.status == 'NORMAL' ? 'badge bg-success' : (user.status == 'LOCKED' ? 'badge bg-danger' : 'badge bg-warning')}"
                                  th:text="${user.status}">NORMAL</span>
                        </td>
                        <td class="small text-muted" th:text="${user.lastLoginAt != null ? #temporals.format(user.lastLoginAt, 'yyyy-MM-dd HH:mm:ss') : '-'}">2023-10-01</td>
                        <td th:if="${session.USER_INFO.hasPermission('USER_MANAGE')}" class="text-end pe-3">
                            <div class="d-flex justify-content-end flex-wrap gap-1">
                                <button class="btn btn-sm btn-outline-secondary"
                                        th:onclick="openUserModal([[${user.userId}]], [[${user.username}]], [[${user.nickname}]], [[${user.email}]], [[${user.status}]], [[${user.roles != null ? user.roles.![roleId] : null}]])">
                                    <i class="bi bi-pencil"></i>
                                </button>
                                <button class="btn btn-sm btn-outline-danger" th:onclick="deleteUser([[${user.userId}]])" th:disabled="${user.username == 'admin'}">
                                    <i class="bi bi-trash"></i>
                                </button>
                            </div>
                        </td>
                    </tr>
                    <tr th:if="${#lists.isEmpty(page.userList)}">
                        <td th:colspan="${session.USER_INFO.hasPermission('USER_MANAGE') ? 8 : 7}" class="text-center py-4 text-muted">No users found.</td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- Pagination -->
    <nav th:if="${page.pageInfo.totalPages > 1}" aria-label="Page navigation">
        <ul class="pagination justify-content-center">
            <li class="page-item">
                <a th:if="${page.pageInfo.number > 1}" th:href="@{/user/(page=1, size=${page.pageInfo.size})}" title="First"
                   class="page-link">First</a>
                <span th:unless="${page.pageInfo.number > 1}" title="First" class="page-link disabled">First</span>
            </li>
            <li class="page-item">
                <a th:if="${page.pageInfo.number > 5 and page.pageInfo.number % 5 == 1}"
                   th:href="@{/user/(page=${page.pageInfo.number - 1}, size=${page.pageInfo.size})}" title="Previous"
                   class="page-link">&laquo;</a>
                <a th:if="${page.pageInfo.number > 5 and page.pageInfo.number % 5 != 1}"
                   th:href="@{/user/(page=${page.pageInfo.number - 5}, size=${page.pageInfo.size})}" title="Previous"
                   class="page-link">&laquo;</a>
                <span th:unless="${page.pageInfo.number > 5}" title="Previous" class="page-link disabled">&laquo;</span>
            </li>
            <li class="page-item"
                th:if="${i <= page.pageInfo.totalPages}"
                th:each="i: ${#numbers.sequence(page.pageInfo.number - (page.pageInfo.number - 1) % 5, page.pageInfo.number - (page.pageInfo.number - 1) % 5 + 4)}">
                <a th:if="${page.pageInfo.number != i}" th:href="@{/user/(page=${i}, size=${page.pageInfo.size})}"
                   th:text="${i}" class="page-link"></a>
                <span th:if="${page.pageInfo.number == i}" th:text="${i}" class="page-link active"></span>
            </li>
            <li class="page-item">
                <a th:if="${page.pageInfo.number < page.pageInfo.totalPages - 5 and page.pageInfo.number % 5 == 0}"
                   th:href="@{/user/(page=${page.pageInfo.number + 1}, size=${page.pageInfo.size})}"
                   title="Next" class="page-link">&raquo;</a>
                <a th:if="${page.pageInfo.number < page.pageInfo.totalPages - 5 and page.pageInfo.number % 5 != 0}"
                   th:href="@{/user/(page=${page.pageInfo.number + 5}, size=${page.pageInfo.size})}"
                   title="Next" class="page-link">&raquo;</a>
                <a th:if="${page.pageInfo.number >= page.pageInfo.totalPages - 5 and page.pageInfo.number < page.pageInfo.totalPages - (page.pageInfo.totalPages - 1) % 5}"
                   th:href="@{/user/(page=${page.pageInfo.totalPages}, size=${page.pageInfo.size})}" title="Next" class="page-link">&raquo;</a>
                <span th:if="${page.pageInfo.number >= page.pageInfo.totalPages - (page.pageInfo.totalPages - 1) % 5}" title="Next" class="page-link disabled">&raquo;</span>
            </li>
            <li class="page-item">
                <a th:if="${page.pageInfo.number < page.pageInfo.totalPages}" th:href="@{/user/(page=${page.pageInfo.totalPages}, size=${page.pageInfo.size})}"
                   title="Last" class="page-link">Last</a>
                <span th:unless="${page.pageInfo.number < page.pageInfo.totalPages}" title="Last" class="page-link disabled">Last</span>
            </li>
        </ul>
    </nav>

    <!-- Role Modal -->
    <div class="modal fade" id="roleModal" tabindex="-1" aria-labelledby="roleModalLabel" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content">
                <form id="roleForm" th:action="@{/user/role/save-permissions}" method="post">
                    <div class="modal-header">
                        <h5 class="modal-title" id="roleModalLabel">Role Permissions</h5>
                        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                    </div>
                    <div class="modal-body">
                        <div class="mb-3">
                            <label for="roleSelect" class="form-label">Select Role</label>
                            <select class="form-select" id="roleSelect" name="roleId" onchange="onRoleChange(this.value)">
                                <option value="">-- Choose a Role --</option>
                                <option th:each="role : ${page.roleList}" th:value="${role.roleId}" th:text="${role.roleName}">ADMIN</option>
                            </select>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Permissions</label>
                            <div class="border rounded p-3 bg-body-tertiary" style="max-height: 310px; overflow-y: auto;">
                                <div class="form-check mb-2" th:each="perm : ${page.permissionList}">
                                    <input class="form-check-input perm-checkbox" type="checkbox" name="permIds" th:value="${perm.permId}" th:id="'perm_' + ${perm.permId}">
                                    <label class="form-check-label" th:for="'perm_' + ${perm.permId}">
                                        <strong th:text="${perm.permCode}">MONITOR_VIEW</strong>
                                        <span class="text-muted d-block small" th:text="${perm.description}">Allows viewing monitor graphs</span>
                                    </label>
                                </div>
                            </div>
                        </div>
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                        <button type="submit" class="btn btn-primary" id="saveRolePermsBtn" disabled>Save Changes</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <!-- User Modal -->
    <div class="modal fade" id="userModal" tabindex="-1" aria-labelledby="userModalLabel" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content">
                <form id="userForm" th:action="@{/user/save}" method="post">
                    <div class="modal-header">
                        <h5 class="modal-title" id="userModalLabel">User</h5>
                        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                    </div>
                    <div class="modal-body">
                        <input type="hidden" id="userId" name="userId" />
                        
                        <div class="mb-3">
                            <label for="username" class="form-label">Username</label>
                            <input type="text" class="form-control" id="username" name="username" required>
                        </div>
                        
                        <div class="mb-3">
                            <label for="password" class="form-label">Password</label>
                            <input type="password" class="form-control" id="password" name="password" placeholder="Leave blank to keep existing password">
                        </div>
                        
                        <div class="mb-3">
                            <label for="nickname" class="form-label">Nickname</label>
                            <input type="text" class="form-control" id="nickname" name="nickname">
                        </div>
                        
                        <div class="mb-3">
                            <label for="email" class="form-label">Email</label>
                            <input type="email" class="form-control" id="email" name="email">
                        </div>
                        
                        <div class="mb-3">
                            <label for="status" class="form-label">Status</label>
                            <select class="form-select" id="status" name="status">
                                <option value="NORMAL">NORMAL</option>
                                <option value="LOCKED">LOCKED</option>
                                <option value="EXPIRED">EXPIRED</option>
                            </select>
                        </div>
                        
                        <div class="mb-3">
                            <label class="form-label">Roles</label>
                            <div>
                                <div class="form-check form-check-inline" th:each="role : ${page.roleList}">
                                    <input class="form-check-input role-checkbox" type="checkbox" name="roleIds" th:value="${role.roleId}" th:id="'role_' + ${role.roleId}">
                                    <label class="form-check-label" th:for="'role_' + ${role.roleId}" th:text="${role.roleName}">ADMIN</label>
                                </div>
                            </div>
                        </div>
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                        <button type="submit" class="btn btn-primary">Save</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</th:block>

<th:block layout:fragment="script">
    <script th:inline="javascript">
        let userModal;
        let roleModal;
        const roleList = /*[[${page.roleList}]]*/ [];
        const permissionList = /*[[${page.permissionList}]]*/ [];
        const isDemoUser = /*[[${session.USER_INFO.hasRole('DEMO')}]]*/ false;

        function setCookie(name, value, days) {
            let expires = "";
            if (days) {
                const date = new Date();
                date.setTime(date.getTime() + (days * 24 * 60 * 60 * 1000));
                expires = "; expires=" + date.toUTCString();
            }
            document.cookie = name + "=" + (value || "")  + expires + "; path=/; SameSite=Lax";
        }

        function getCookie(name) {
            const nameEQ = name + "=";
            const ca = document.cookie.split(';');
            for(let i=0; i < ca.length; i++) {
                let c = ca[i];
                while (c.charAt(0) === ' ') c = c.substring(1, c.length);
                if (c.indexOf(nameEQ) === 0) return c.substring(nameEQ.length, c.length);
            }
            return null;
        }

        function calculateAutoPageSize() {
            const reservedHeight = 310;
            const rowHeight = 49;
            const availableHeight = window.innerHeight - reservedHeight;
            let count = Math.floor(availableHeight / rowHeight);
            if (count < 5) count = 5;
            if (count > 50) count = 50;
            return count;
        }

        $(function() {
            const sizeCookieKey = 'user_list_page_size';
            const modeCookieKey = 'user_list_page_size_mode';
            
            const urlParams = new URLSearchParams(window.location.search);
            const currentSizeParam = urlParams.get('size');
            const renderedSize = [[${page.pageInfo.size}]];
            
            let savedMode = getCookie(modeCookieKey) || 'auto';
            let savedSize = getCookie(sizeCookieKey);

            if (currentSizeParam) {
                if (savedMode === 'manual') {
                    if (savedSize !== currentSizeParam) {
                        setCookie(sizeCookieKey, currentSizeParam, 365);
                    }
                }
                $('#pageSizeSelect').val(savedMode === 'auto' ? 'auto' : currentSizeParam);
            } else {
                if (savedMode === 'auto') {
                    $('#pageSizeSelect').val('auto');
                    
                    const optimalSize = calculateAutoPageSize();
                    if (optimalSize !== renderedSize) {
                        setCookie(sizeCookieKey, optimalSize, 365);
                        setCookie(modeCookieKey, 'auto', 365);
                        
                        urlParams.set('size', optimalSize);
                        window.location.search = urlParams.toString();
                        return;
                    }
                } else {
                    $('#pageSizeSelect').val(renderedSize);
                }
            }

            $('#pageSizeSelect').on('change', function() {
                const val = $(this).val();
                
                if (val === 'auto') {
                    setCookie(modeCookieKey, 'auto', 365);
                    const optimalSize = calculateAutoPageSize();
                    setCookie(sizeCookieKey, optimalSize, 365);
                    urlParams.set('size', optimalSize);
                } else {
                    setCookie(modeCookieKey, 'manual', 365);
                    setCookie(sizeCookieKey, val, 365);
                    urlParams.set('size', val);
                }
                
                urlParams.set('page', '1');
                window.location.search = urlParams.toString();
            });

            userModal = new bootstrap.Modal('#userModal');
            roleModal = new bootstrap.Modal('#roleModal');
            
            const $userForm = $('#userForm');
            $userForm.on('submit', function(e) {
                e.preventDefault();
                if (isDemoUser) {
                    alert('Modifying users is not allowed in the demo environment.');
                    userModal.hide();
                    return;
                }
                $.ajax({
                    url: $userForm.attr('action'),
                    type: 'POST',
                    data: $userForm.serialize(),
                    success: function(res) {
                        if (res.success) {
                            userModal.hide();
                            location.reload();
                        } else {
                            alert('Error saving user: ' + res.error.message);
                        }
                    },
                    error: function(xhr) {
                        alert('System error occurred while saving user');
                    }
                });
            });

            const $roleForm = $('#roleForm');
            $roleForm.on('submit', function(e) {
                e.preventDefault();
                if (isDemoUser) {
                    alert('Modifying role permissions is not allowed in the demo environment.');
                    roleModal.hide();
                    return;
                }
                $.ajax({
                    url: $roleForm.attr('action'),
                    type: 'POST',
                    data: $roleForm.serialize(),
                    success: function(res) {
                        if (res.success) {
                            roleModal.hide();
                            location.reload();
                        } else {
                            alert('Error saving permissions: ' + res.error.message);
                        }
                    },
                    error: function(xhr) {
                        alert('System error occurred while saving permissions');
                    }
                });
            });
        });

        function openUserModal(id, username, nickname, email, status, roleIds) {
            const $form = $('#userForm');
            $form[0].reset();
            
            $('#userId').val(id || '');
            $('#username').val(username || '').prop('readonly', !!id);
            $('#password').prop('required', !id);
            $('#nickname').val(nickname || '');
            $('#email').val(email || '');
            $('#status').val(status || 'NORMAL');
            
            // Clear and set checkboxes
            $('.role-checkbox').prop('checked', false);
            if (roleIds) {
                let ids = Array.isArray(roleIds) ? roleIds : [];
                if (typeof roleIds === 'string') {
                    try { ids = JSON.parse(roleIds); } catch(e) {}
                }
                ids.forEach(roleId => {
                    $(`#role_${roleId}`).prop('checked', true);
                });
            }
            
            $('#userModalLabel').text(id ? 'Edit User' : 'New User');
            userModal.show();
        }

        function deleteUser(id) {
            if (isDemoUser) {
                alert('Deleting users is not allowed in the demo environment.');
                return;
            }
            if (confirm('Are you sure you want to delete this user?')) {
                $.ajax({
                    url: /*[[@{/user/delete}]]*/ '/user/delete',
                    type: 'POST',
                    data: { userId: id },
                    success: function(res) {
                        if (res.success) {
                            location.reload();
                        } else {
                            alert('Error deleting user: ' + res.error.message);
                        }
                    },
                    error: function(xhr) {
                        alert('System error occurred while deleting user');
                    }
                });
            }
        }
        function openRoleModal() {
            $('#roleForm')[0].reset();
            $('#roleSelect').val('');
            $('.perm-checkbox').prop('checked', false);
            $('#saveRolePermsBtn').prop('disabled', true);
            roleModal.show();
        }

        function onRoleChange(roleId) {
            $('.perm-checkbox').prop('checked', false);
            if (!roleId) {
                $('#saveRolePermsBtn').prop('disabled', true);
                return;
            }
            $('#saveRolePermsBtn').prop('disabled', false);

            const selectedRole = roleList.find(r => r.roleId == roleId);
            if (selectedRole && selectedRole.permissions) {
                selectedRole.permissions.forEach(perm => {
                    $(`#perm_${perm.permId}`).prop('checked', true);
                });
            }
        }
    </script>
</th:block>
</body>
</html>
