<!DOCTYPE html>
<html lang="en"
      xmlns:th="https://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{templates/default}">
<body>
<th:block layout:fragment="content">
    <div class="d-flex flex-column flex-md-row justify-content-between align-items-start align-items-md-center gap-3 mb-3">
        <h4 class="mb-0">
            <i class="bi bi-clock-history me-2"></i> 
            <span th:if="${!#strings.isEmpty(page.username)}" th:text="|Login History for '${page.username}'|">Login History</span>
            <span th:if="${#strings.isEmpty(page.username)}">All Login History</span>
        </h4>
        <div class="d-flex flex-wrap align-items-center gap-2 gap-md-3">
            <select class="form-select form-select-sm" id="pageSizeSelect" style="width: auto;">
                <option value="auto">Auto (Fit Height)</option>
                <option value="10">10 per page</option>
                <option value="20">20 per page</option>
                <option value="30">30 per page</option>
                <option value="50">50 per page</option>
                <option value="100">100 per page</option>
            </select>
            <div th:if="${!#strings.isEmpty(page.username)}">
                <a th:href="@{/user/login-history(size=${page.pageInfo.size})}" class="btn btn-outline-secondary btn-sm">Show All</a>
            </div>
        </div>
    </div>

    <div class="card shadow-sm overflow-hidden mb-4">
        <div class="card-body p-0">
            <div class="table-responsive">
                <table class="table table-hover table-striped mb-0 align-middle">
                    <thead>
                    <tr>
                        <th class="ps-3 text-muted small text-uppercase" style="width: 60px;">ID</th>
                        <th class="text-muted small text-uppercase">Username</th>
                        <th class="text-muted small text-uppercase">IP Address</th>
                        <th class="text-muted small text-uppercase">Status</th>
                        <th class="text-muted small text-uppercase">Time</th>
                        <th class="pe-3 text-muted small text-uppercase">User Agent</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="history : ${page.historyList}">
                        <td class="ps-3" th:text="${history.historyId}">1</td>
                        <td>
                            <a th:href="@{/user/login-history(username=${history.username})}" 
                               class="text-decoration-none fw-bold" th:text="${history.username}">admin</a>
                        </td>
                        <td th:text="${history.ipAddress}">127.0.0.1</td>
                        <td>
                            <span th:class="${#strings.equals(history.successYn, 'Y') ? 'badge bg-success' : 'badge bg-danger'}"
                                  th:text="${#strings.equals(history.successYn, 'Y') ? 'SUCCESS' : 'FAILED'}">SUCCESS</span>
                        </td>
                        <td th:text="${#temporals.format(history.loginAt, 'yyyy-MM-dd HH:mm:ss')}">2023-10-01 12:00:00</td>
                        <td class="pe-3 small text-muted text-truncate" style="max-width: 300px;" 
                            th:text="${history.userAgent}" th:title="${history.userAgent}">Mozilla/5.0...</td>
                    </tr>
                    <tr th:if="${#lists.isEmpty(page.historyList)}">
                        <td colspan="6" class="text-center py-4 text-muted">No login history found.</td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- Pagination -->
    <nav th:if="${page.pageInfo.totalPages > 1}" aria-label="Page navigation">
        <ul class="pagination justify-content-center">
            <li class="page-item">
                <a th:if="${page.pageInfo.number > 1}" th:href="@{/user/login-history(page=1, size=${page.pageInfo.size}, username=${#strings.isEmpty(page.username) ? null : page.username})}" title="First"
                   class="page-link">First</a>
                <span th:unless="${page.pageInfo.number > 1}" title="First" class="page-link disabled">First</span>
            </li>
            <li class="page-item">
                <a th:if="${page.pageInfo.number > 5 and page.pageInfo.number % 5 == 1}"
                   th:href="@{/user/login-history(page=${page.pageInfo.number - 1}, size=${page.pageInfo.size}, username=${#strings.isEmpty(page.username) ? null : page.username})}" title="Previous"
                   class="page-link">&laquo;</a>
                <a th:if="${page.pageInfo.number > 5 and page.pageInfo.number % 5 != 1}"
                   th:href="@{/user/login-history(page=${page.pageInfo.number - 5}, size=${page.pageInfo.size}, username=${#strings.isEmpty(page.username) ? null : page.username})}" title="Previous"
                   class="page-link">&laquo;</a>
                <span th:unless="${page.pageInfo.number > 5}" title="Previous" class="page-link disabled">&laquo;</span>
            </li>
            <li class="page-item"
                th:if="${i <= page.pageInfo.totalPages}"
                th:each="i: ${#numbers.sequence(page.pageInfo.number - (page.pageInfo.number - 1) % 5, page.pageInfo.number - (page.pageInfo.number - 1) % 5 + 4)}">
                <a th:if="${page.pageInfo.number != i}" th:href="@{/user/login-history(page=${i}, size=${page.pageInfo.size}, username=${#strings.isEmpty(page.username) ? null : page.username})}"
                   th:text="${i}" class="page-link"></a>
                <span th:if="${page.pageInfo.number == i}" th:text="${i}" class="page-link active"></span>
            </li>
            <li class="page-item">
                <a th:if="${page.pageInfo.number < page.pageInfo.totalPages - 5 and page.pageInfo.number % 5 == 0}"
                   th:href="@{/user/login-history(page=${page.pageInfo.number + 1}, size=${page.pageInfo.size}, username=${#strings.isEmpty(page.username) ? null : page.username})}"
                   title="Next" class="page-link">&raquo;</a>
                <a th:if="${page.pageInfo.number < page.pageInfo.totalPages - 5 and page.pageInfo.number % 5 != 0}"
                   th:href="@{/user/login-history(page=${page.pageInfo.number + 5}, size=${page.pageInfo.size}, username=${#strings.isEmpty(page.username) ? null : page.username})}"
                   title="Next" class="page-link">&raquo;</a>
                <a th:if="${page.pageInfo.number >= page.pageInfo.totalPages - 5 and page.pageInfo.number < page.pageInfo.totalPages - (page.pageInfo.totalPages - 1) % 5}"
                   th:href="@{/user/login-history(page=${page.pageInfo.totalPages}, size=${page.pageInfo.size}, username=${#strings.isEmpty(page.username) ? null : page.username})}" title="Next" class="page-link">&raquo;</a>
                <span th:if="${page.pageInfo.number >= page.pageInfo.totalPages - (page.pageInfo.totalPages - 1) % 5}" title="Next" class="page-link disabled">&raquo;</span>
            </li>
            <li class="page-item">
                <a th:if="${page.pageInfo.number < page.pageInfo.totalPages}" th:href="@{/user/login-history(page=${page.pageInfo.totalPages}, size=${page.pageInfo.size}, username=${#strings.isEmpty(page.username) ? null : page.username})}"
                   title="Last" class="page-link">Last</a>
                <span th:unless="${page.pageInfo.number < page.pageInfo.totalPages}" title="Last" class="page-link disabled">Last</span>
            </li>
        </ul>
    </nav>
</th:block>

<th:block layout:fragment="script">
    <script th:inline="javascript">
        function setCookie(name, value, days) {
            let expires = "";
            if (days) {
                const date = new Date();
                date.setTime(date.getTime() + (days * 24 * 60 * 60 * 1000));
                expires = "; expires=" + date.toUTCString();
            }
            document.cookie = name + "=" + (value || "")  + expires + "; path=/; SameSite=Lax";
        }

        function getCookie(name) {
            const nameEQ = name + "=";
            const ca = document.cookie.split(';');
            for(let i=0; i < ca.length; i++) {
                let c = ca[i];
                while (c.charAt(0) === ' ') c = c.substring(1, c.length);
                if (c.indexOf(nameEQ) === 0) return c.substring(nameEQ.length, c.length);
            }
            return null;
        }

        $(function() {
            const sizeCookieKey = 'login_history_page_size';
            const modeCookieKey = 'login_history_page_size_mode';
            
            const urlParams = new URLSearchParams(window.location.search);
            const currentSizeParam = urlParams.get('size');
            const currentUsername = [[${page.username}]];
            const renderedSize = [[${page.pageInfo.size}]];
            
            let savedMode = getCookie(modeCookieKey) || 'auto';
            let savedSize = getCookie(sizeCookieKey);

            if (currentSizeParam) {
                if (savedMode === 'manual') {
                    if (savedSize !== currentSizeParam) {
                        setCookie(sizeCookieKey, currentSizeParam, 365);
                    }
                }
                $('#pageSizeSelect').val(savedMode === 'auto' ? 'auto' : currentSizeParam);
            } else {
                if (savedMode === 'auto') {
                    $('#pageSizeSelect').val('auto');
                    
                    const optimalSize = calculateAutoPageSize();
                    if (optimalSize !== renderedSize) {
                        // 최초 방문했거나 화면 높이가 변경되어 계산된 크기가 렌더링된 크기와 다를 때만 1회 리다이렉트
                        setCookie(sizeCookieKey, optimalSize, 365);
                        setCookie(modeCookieKey, 'auto', 365);
                        
                        urlParams.set('size', optimalSize);
                        if (currentUsername) {
                            urlParams.set('username', currentUsername);
                        }
                        window.location.search = urlParams.toString();
                        return;
                    }
                } else {
                    $('#pageSizeSelect').val(renderedSize);
                }
            }

            $('#pageSizeSelect').on('change', function() {
                const val = $(this).val();
                
                if (val === 'auto') {
                    setCookie(modeCookieKey, 'auto', 365);
                    const optimalSize = calculateAutoPageSize();
                    setCookie(sizeCookieKey, optimalSize, 365);
                    urlParams.set('size', optimalSize);
                } else {
                    setCookie(modeCookieKey, 'manual', 365);
                    setCookie(sizeCookieKey, val, 365);
                    urlParams.set('size', val);
                }
                
                urlParams.set('page', '1');
                if (currentUsername) {
                    urlParams.set('username', currentUsername);
                } else {
                    urlParams.delete('username');
                }
                window.location.search = urlParams.toString();
            });
        });

        function calculateAutoPageSize() {
            const reservedHeight = 310;
            const rowHeight = 41;
            const availableHeight = window.innerHeight - reservedHeight;
            let count = Math.floor(availableHeight / rowHeight);
            if (count < 5) count = 5;
            if (count > 50) count = 50;
            return count;
        }
    </script>
</th:block>
</body>
</html>
